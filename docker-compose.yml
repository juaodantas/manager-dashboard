services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: manager
      POSTGRES_PASSWORD: manager
      POSTGRES_DB: manager_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U manager -d manager_db"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
