name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build packages
        run: npx turbo run build --filter=@manager/domain --filter=@manager/tsconfig

      - name: Lint
        run: npx turbo run lint

      - name: Test
        run: npx turbo run test

  check-migrations:
    name: Check Migrations
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate migration (dry run)
        working-directory: apps/api
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_CI }}
        run: |
          npx ts-node -r tsconfig-paths/register \
            ./node_modules/.bin/typeorm migration:generate \
            src/infrastructure/database/typeorm/migrations/ci-check \
            -d src/infrastructure/database/typeorm/data-source.ts
          # Fail if a new migration file was generated (entity changed without migration)
          if git diff --name-only | grep -q "migrations/ci-check"; then
            echo "Entity changes detected without a corresponding migration file!"
            exit 1
          fi
